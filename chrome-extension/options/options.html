<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pawbot Browser Settings</title>
  <style>
    body {
      font-family: -apple-system, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
      background: #f6f9ff;
      color: #1f2937;
      padding: 32px;
      max-width: 640px;
      margin: 0 auto;
    }
    h1 { margin-top: 0; }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid rgba(37, 99, 235, 0.25);
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    button {
      margin-top: 16px;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .help {
      font-size: 13px;
      color: #4b5563;
      margin-top: 8px;
    }
    .ok {
      color: #166534;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>Pawbot Browser Settings</h1>
  <p>Add your xAI Grok API key. The key stays only on this Chrome profile and is never sent anywhere except to api.x.ai.</p>

  <label for="key">xAI API key</label>
  <input id="key" type="password" placeholder="xai-..." autocomplete="off" />
  <p class="help">Get one at <a href="https://console.x.ai" target="_blank">console.x.ai</a> if you don't have one.</p>

  <button id="save">Save</button>
  <span id="status" class="ok" style="margin-left:12px"></span>

  <script src="options.js"></script>
</body>
</html>
